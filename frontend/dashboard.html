<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>HostelEase — Dashboard</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="topbar" id="topbar"></div>
  <div class="container">
    <div id="msg"></div>

    <div class="grid grid-3" id="statCards"></div>

    <div class="card">
      <h2>Occupancy by hostel</h2>
      <table id="occupancyTable">
        <thead><tr><th>Hostel</th><th>Rooms</th><th>Capacity</th><th>Occupied</th><th>Vacant</th><th>Occupancy %</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Room type breakdown</h2>
      <table id="roomTypeTable">
        <thead><tr><th>Room type</th><th>Capacity</th><th>Occupied</th><th>Occupancy %</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Fee defaulters (overdue &gt; 14 days grace)</h2>
      <table id="defaultersTable">
        <thead><tr><th>Student</th><th>Student ID</th><th>Outstanding</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
