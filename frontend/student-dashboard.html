<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HostelEase | Student Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/student.css">
</head>

<body>

<div class="student-container">

    <aside class="sidebar">

        <h2>🏠 HostelEase</h2>

        <ul>

            <li><a href="student-dashboard.html" class="active">🏠 Dashboard</a></li>

            <li><a href="rooms.html">🛏 My Room</a></li>

            <li><a href="fees.html">💰 My Fees</a></li>

            <li><a href="complaints.html">📢 My Complaints</a></li>

            <li><a href="student-visitors.html">👥 My Visitors</a></li>

            <li><a href="#" id="logoutBtn">🚪 Logout</a></li>

        </ul>

    </aside>

    <main class="main-content">

        <div class="welcome-card">

            <h1 id="studentName">Welcome 👋</h1>

            <p id="studentEmail"></p>

            <small id="studentId"></small>

        </div>

        <div class="dashboard-grid">

            <div class="dashboard-card">
                <h3>🛏 Room</h3>
                <h2 id="roomNumber">Loading...</h2>
                <p id="roomType"></p>
            </div>

            <div class="dashboard-card">
                <h3>💰 Pending Fees</h3>
                <h2 id="pendingFees">Loading...</h2>
            </div>

            <div class="dashboard-card">
                <h3>📢 Complaints</h3>
                <h2 id="complaintCount">Loading...</h2>
            </div>

            <div class="dashboard-card">
                <h3>👥 Visitors</h3>
                <h2 id="visitorCount">Loading...</h2>
            </div>

        </div>

        <div class="profile-card">

            <h2>Student Information</h2>

            <table>

                <tr>

                    <td><strong>Name</strong></td>

                    <td id="profileName"></td>

                </tr>

                <tr>

                    <td><strong>Email</strong></td>

                    <td id="profileEmail"></td>

                </tr>

                <tr>

                    <td><strong>Student ID</strong></td>

                    <td id="profileId"></td>

                </tr>

            </table>

        </div>

    </main>

</div>

<script src="js/api.js"></script>

<script src="js/student-dashboard.js"></script>

</body>

</html>
