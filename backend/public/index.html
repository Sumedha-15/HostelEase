<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>HostelEase — Sign in</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1>HostelEase</h1>
      <p class="sub">Hostel administration made simple</p>

      <div class="tab-toggle">
        <button id="tabLogin" class="active">Sign In</button>
        <button id="tabRegister">Register (student)</button>
      </div>

      <div id="msg"></div>

      <form id="loginForm">
        <div class="field"><label>Email</label><input type="email" id="loginEmail" required /></div>
        <div class="field"><label>Password</label><input type="password" id="loginPassword" required /></div>
        <button type="submit">Sign In</button>
      </form>

      <form id="registerForm" style="display:none">
        <div class="field"><label>Full name</label><input type="text" id="regName" required /></div>
        <div class="field"><label>Email</label><input type="email" id="regEmail" required /></div>
        <div class="field"><label>Password</label><input type="password" id="regPassword" required minlength="6" /></div>
        <div class="field"><label>Student ID</label><input type="text" id="regStudentId" required /></div>
        <div class="field"><label>Gender</label>
          <select id="regGender">
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="field"><label>Phone</label><input type="text" id="regPhone" /></div>
        <button type="submit">Create account</button>
      </form>

      <div class="demo-creds">
        <strong>Demo logins (after running the seed script):</strong><br/>
        Admin: admin@hostelease.com / admin123<br/>
        Warden: warden@hostelease.com / warden123<br/>
        Student: aman@student.com / student123
      </div>
    </div>
  </div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
