<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>HostelEase — Rooms</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="topbar" id="topbar"></div>
  <div class="container">
    <div id="msg"></div>

    <div class="card" id="studentAllocationCard" style="display:none">
      <h2>My room allocation</h2>
      <div id="myAllocationBox"></div>
      <form class="inline" id="requestForm">
        <div class="field"><label>Preferred room type</label>
          <select id="prefType">
            <option value="single">Single</option>
            <option value="double">Double</option>
            <option value="triple">Triple</option>
            <option value="dormitory">Dormitory</option>
          </select>
        </div>
        <div class="field"><label>Preferred floor</label><input type="number" id="prefFloor" min="0" placeholder="any" /></div>
        <button type="submit">Request room</button>
      </form>
    </div>

    <div class="card" id="adminCreateCard" style="display:none">
      <h2>Create hostel</h2>
      <form class="inline" id="hostelForm">
        <div class="field"><label>Name</label><input type="text" id="hName" required /></div>
        <div class="field"><label>Gender category</label>
          <select id="hGender"><option value="male">Male</option><option value="female">Female</option><option value="co-ed">Co-ed</option></select>
        </div>
        <div class="field"><label>Total floors</label><input type="number" id="hFloors" min="1" value="4" required /></div>
        <button type="submit">Add hostel</button>
      </form>

      <h2>Create room</h2>
      <form class="inline" id="roomForm">
        <div class="field"><label>Hostel</label><select id="rHostel"></select></div>
        <div class="field"><label>Room number</label><input type="text" id="rNumber" required /></div>
        <div class="field"><label>Floor</label><input type="number" id="rFloor" min="0" required /></div>
        <div class="field"><label>Type</label>
          <select id="rType"><option value="single">Single</option><option value="double">Double</option><option value="triple">Triple</option><option value="dormitory">Dormitory</option></select>
        </div>
        <div class="field"><label>Capacity</label><input type="number" id="rCapacity" min="1" value="2" required /></div>
        <div class="field"><label>Monthly rent (₹)</label><input type="number" id="rRent" min="0" value="5000" required /></div>
        <button type="submit">Add room</button>
      </form>
    </div>

    <div class="card" id="pendingRequestsCard" style="display:none">
      <h2>Pending room requests</h2>
      <p>Students who have requested a room. Allocate only shows rooms that currently have a free seat.</p>
      <table id="pendingTable">
        <thead><tr><th>Student</th><th>Preferred type</th><th>Preferred floor</th><th>Requested on</th><th>Allocate room</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <h2>All rooms</h2>
      <table id="roomsTable">
        <thead><tr><th>Hostel</th><th>Room</th><th>Floor</th><th>Type</th><th>Capacity</th><th>Occupied</th><th>Occupants</th><th>Rent</th><th>Status</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

<script src="js/api.js"></script>
<script src="js/rooms.js"></script>
</body>
</html>
