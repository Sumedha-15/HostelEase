<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>HostelEase — Complaints</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="topbar" id="topbar"></div>
  <div class="container">
    <div id="msg"></div>

    <div class="card" id="studentComplaintCard" style="display:none">
      <h2>File a complaint</h2>
      <form class="inline" id="complaintForm">
        <div class="field"><label>Category</label>
          <select id="cCategory">
            <option value="electrical">Electrical</option>
            <option value="plumbing">Plumbing</option>
            <option value="wifi">Wifi</option>
            <option value="cleanliness">Cleanliness</option>
            <option value="furniture">Furniture</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="field"><label>Description</label><textarea id="cDesc" required></textarea></div>
        <button type="submit">Submit</button>
      </form>
    </div>

    <div class="card">
      <h2 id="complaintsHeading">Complaints</h2>
      <table id="complaintsTable">
        <thead><tr><th>Student</th><th>Room</th><th>Category</th><th>Description</th><th>Priority</th><th>Status</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

<script src="js/api.js"></script>
<script src="js/complaints.js"></script>
</body>
</html>
